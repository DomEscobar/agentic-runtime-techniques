status_date: "2026-07-04"
purpose: "Machine-readable decision index for agents designing agentic systems."
how_to_use:
  - "Match the desired system goal to a use_case."
  - "Start with the recommended base_pattern."
  - "Add required_primitives before adding optional_patterns."
  - "Check failure_modes and avoid_when before finalizing the architecture."
  - "Follow docs and data links for diagrams, evidence, and implementation notes."

core_decision_questions:
  - id: duration
    question: "Is the system one-shot, multi-step, or long-running?"
  - id: verifiability
    question: "Can success be checked objectively?"
  - id: risk
    question: "Can actions affect external systems, money, users, files, or public channels?"
  - id: tool_need
    question: "Does the task require tools, retrieval, code execution, or remote agents?"
  - id: coordination
    question: "Does one agent have enough context, tools, and authority?"
  - id: durability
    question: "What state must survive context loss, crash, or handoff?"
  - id: failure_policy
    question: "What happens on no progress, budget exhaustion, or tool failure?"
  - id: audit
    question: "What trace would a human need to debug or trust the run?"

use_cases:
  - id: simple_tool_assistant
    goal: "Answer user requests while calling tools when needed."
    base_pattern: "ReAct"
    recommended_stack:
      - "Intent / Context / Routing Front Door"
      - "Stateful Harness Around Pure Agent Loop"
      - "ReAct"
      - "Tool error recovery"
      - "Loop Detection Circuit Breaker"
      - "Token Budget Circuit Breaker"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - tool schemas
      - observations
      - stop condition
      - error-to-observation handling
      - loop budget
    optional_patterns:
      - "Codex Goal / Verifier Loop"
      - "Guardrail Pipeline"
      - "MCP Tool / Context Protocol Layer"
    failure_modes:
      - infinite tool loop
      - tool hallucination
      - weak termination
      - unsafe tool action
    avoid_when:
      - "The work is long-running or needs durable checkpoints."
      - "The action risk requires human approval before execution."
    docs:
      - "../docs/flow-diagrams.md#1-core-react--tool-loop"
      - "../docs/flow-diagrams.md#34-stateful-harness-around-pure-agent-loop"
      - "../docs/tau-harness-techniques.md"
      - "../docs/decision-guide.md#if-the-system-must-use-tools"

  - id: multi_step_task_agent
    goal: "Complete a larger task through visible, inspectable steps."
    base_pattern: "Plan-and-Execute"
    recommended_stack:
      - "Stateful Harness Around Pure Agent Loop"
      - "Intent / Context / Routing Front Door"
      - "Plan-and-Execute"
      - "Plan-Mode Todo Loop"
      - "Codex Goal / Verifier Loop"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - plan artifact
      - mutable task state
      - progress status
      - replan trigger
      - done check
    optional_patterns:
      - "Task Queue / Resumable Workflow Runtime"
      - "Agent-as-Judge / Referee Team"
      - "Steering and Follow-Up Queues"
    failure_modes:
      - stale plan
      - fake progress
      - no-progress loop
    avoid_when:
      - "The task is small enough for a one-shot answer."
      - "The task is pure open-ended research with unknown subquestions."
    docs:
      - "../docs/flow-diagrams.md#3-plan-and-execute-loop"
      - "../docs/decision-guide.md#if-the-system-must-finish-multi-step-work"

  - id: correctness_critical_agent
    goal: "Optimize for correct completion rather than speed."
    base_pattern: "Codex Goal / Verifier Loop"
    recommended_stack:
      - "Codex Goal / Verifier Loop"
      - "Agent-as-Judge / Referee Team"
      - "Typed blocker states"
      - "Bounded retry"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - explicit goal
      - acceptance criteria
      - verifier or tests
      - retry budget
      - blocked state
    optional_patterns:
      - "Multi-Agent Debate / Committee Deliberation"
      - "Evaluator / Optimizer Loop"
    failure_modes:
      - self-certifying success
      - verifier blind spot
      - endless revision
    avoid_when:
      - "There is no meaningful acceptance criterion."
      - "Latency matters more than quality."
    docs:
      - "../docs/flow-diagrams.md#4-verifier--goal-loop"
      - "../docs/decision-guide.md#if-correctness-matters-more-than-speed"

  - id: research_agent
    goal: "Produce source-grounded answers from external or changing information."
    base_pattern: "Deep Research Loop"
    recommended_stack:
      - "Deep Research Loop"
      - "Source ledger"
      - "Context Packing / Compression Loop"
      - "Gap analysis"
      - "Citation verifier"
    required_primitives:
      - query planner
      - source extraction
      - source ledger
      - synthesis step
      - gap analysis
    optional_patterns:
      - "Self-RAG"
      - "Corrective RAG"
      - "Agent-as-Judge / Referee Team"
    failure_modes:
      - source laundering
      - stale facts
      - over-searching
      - citation mismatch
    avoid_when:
      - "The answer is fully known from local context."
      - "No reliable source access exists."
    docs:
      - "../docs/flow-diagrams.md#7-research-loop"
      - "../docs/decision-guide.md#if-the-system-researches-or-answers-with-facts"

  - id: coding_agent
    goal: "Modify code safely and verify the change."
    base_pattern: "Coding Harness Loop"
    recommended_stack:
      - "Repo inspection"
      - "Stateful Harness Around Pure Agent Loop"
      - "Plan / todos"
      - "Read-Before-Write File Gate"
      - "Coding Harness Loop"
      - "Tests or checks"
      - "Reviewer / verifier"
    required_primitives:
      - repository inspection
      - edit discipline
      - tests or checks
      - reviewer
      - failure report
    optional_patterns:
      - "SWE-agent / Agent-Computer Interface"
      - "Ralph Loop"
      - "Implement / Review / Merge"
      - "Steering and Follow-Up Queues"
    failure_modes:
      - unverified edits
      - unrelated refactor
      - stale file writes
      - weak tests
    avoid_when:
      - "The task only asks for explanation."
      - "No safe edit or verification boundary exists."
    docs:
      - "../docs/flow-diagrams.md#19-coding-harness-loop"
      - "../docs/tau-harness-techniques.md"
      - "../docs/decision-guide.md#if-the-system-edits-code"

  - id: multi_agent_system
    goal: "Coordinate multiple agents with different roles, tools, context, or authority."
    base_pattern: "Supervisor or Swarm"
    recommended_stack:
      - "Intent router"
      - "Supervisor Architecture or Swarm Architecture"
      - "Typed result schemas"
      - "Delegation ledger"
      - "No-progress breaker"
      - "Run receipt"
    required_primitives:
      - role registry
      - delegation or handoff contract
      - max turns or depth
      - result schema
      - trace of ownership
    optional_patterns:
      - "Hierarchical Supervisor Tree"
      - "Blackboard / Shared Workspace Coordination"
      - "A2A / Agent Interoperability Protocol Layer"
    failure_modes:
      - delegation loops
      - handoff drift
      - coordination overhead
      - translation loss
    avoid_when:
      - "One agent with the right tools can do the task."
      - "There is no clear role separation."
    docs:
      - "../docs/supervisor-swarm-techniques.md"
      - "../docs/flow-diagrams.md#23-supervisor-architecture"
      - "../docs/flow-diagrams.md#24-swarm-architecture"

  - id: durable_background_agent
    goal: "Run work that can sleep, wait, retry, checkpoint, or outlive a chat turn."
    base_pattern: "Task Queue / Resumable Workflow Runtime"
    recommended_stack:
      - "Task queue"
      - "Stateful Harness Around Pure Agent Loop"
      - "Worker lease"
      - "Checkpoint / status"
      - "Retry / backoff"
      - "Heartbeat or cron trigger"
      - "Run receipt"
    required_primitives:
      - task ID
      - queue
      - checkpoint
      - status contract
      - retry policy
      - artifact store
    optional_patterns:
      - "HITL Interrupt / Approval Gate"
      - "Guardrail Pipeline"
      - "Context Packing / Compression Loop"
      - "Dangling Tool-Call Repair"
    failure_modes:
      - lost progress
      - duplicate side effects
      - stale checkpoint
      - silent failure
    avoid_when:
      - "The task must return synchronously and has no durable state."
    docs:
      - "../docs/flow-diagrams.md#33-task-queue--resumable-workflow-runtime"
      - "../docs/openclaw-hermes-techniques.md"

  - id: risky_action_agent
    goal: "Take actions that can affect external systems, users, money, files, or public channels."
    base_pattern: "HITL Interrupt / Approval Gate"
    recommended_stack:
      - "Risk classifier"
      - "Guardrail Pipeline"
      - "Prompt-Injection Action Firewall"
      - "Capability / Least-Privilege Runtime"
      - "HITL Interrupt / Approval Gate"
      - "Audit trail"
      - "Resume semantics"
    required_primitives:
      - risk policy
      - original intent record
      - scoped capability grant
      - pending action record
      - human approval branch
      - reject/edit branch
      - audit event
    optional_patterns:
      - "Run Receipt / Trace-First Runtime"
      - "Task Queue / Resumable Workflow Runtime"
      - "Artifact Provenance Graph"
    failure_modes:
      - accidental external action
      - approval fatigue
      - incomplete resume state
    avoid_when:
      - "The action is harmless, reversible, and local."
    docs:
      - "../docs/flow-diagrams.md#31-hitl-interrupt--approval-gate"
      - "../docs/decision-guide.md#if-the-system-runs-in-production"

  - id: interoperable_agent_platform
    goal: "Expose or consume tools, context, or remote agents across process/framework boundaries."
    base_pattern: "MCP and/or A2A Protocol Layer"
    recommended_stack:
      - "Capability discovery"
      - "MCP Tool / Context Protocol Layer"
      - "A2A / Agent Interoperability Protocol Layer"
      - "Auth and policy"
      - "Tracing"
    required_primitives:
      - capability manifest
      - schema validation
      - authentication
      - status or result contract
      - trace events
    optional_patterns:
      - "Supervisor Architecture"
      - "Task Queue / Resumable Workflow Runtime"
      - "Guardrail Pipeline"
    failure_modes:
      - overexposed tools
      - untrusted remote agents
      - schema drift
      - opaque failures
    avoid_when:
      - "All tools and agents are local and fixed."
    docs:
      - "../docs/additional-runtime-patterns.md#4-a2a--agent-interoperability-protocol-layer"
      - "../docs/additional-runtime-patterns.md#5-mcp-toolcontext-protocol-layer"

  - id: cost_sensitive_high_volume_agent
    goal: "Serve high query volume where paying premium-model prices for every request is not affordable."
    base_pattern: "Model Cascading / Tiered Routing"
    recommended_stack:
      - "Model Cascading / Tiered Routing"
      - "Semantic / Prompt Caching Layer"
      - "Runtime Budget Policy Engine"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - tiered model registry
      - confidence/router scoring
      - cache key strategy
      - cost accounting
    optional_patterns:
      - "Self-Consistency / Sample-and-Vote"
      - "Token Budget Circuit Breaker"
      - "Cost-Aware Agentic Query Optimizer"
      - "Agent-Aware Serving Policy Layer"
    failure_modes:
      - cost spike
      - misrouted hard query to weak model
      - stale cache hit
    avoid_when:
      - "Traffic volume is low or every query needs the strongest available model."
    docs:
      - "../docs/flow-diagrams.md#44-model-cascading--tiered-routing"
      - "../docs/decision-guide.md#quick-selection"

  - id: transactional_side_effect_agent
    goal: "Call multiple external, stateful APIs where partial failure must not leave the world in a broken state."
    base_pattern: "Saga / Compensating Transaction Loop"
    recommended_stack:
      - "Saga / Compensating Transaction Loop"
      - "Idempotency Key Runtime"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - step log
      - compensating action per step
      - idempotency key generation
      - key/result ledger
    optional_patterns:
      - "Task Queue / Resumable Workflow Runtime"
      - "HITL Interrupt / Approval Gate"
    failure_modes:
      - duplicate side effects
      - partial multi-api failure
      - uncompensated step
    avoid_when:
      - "Side effects are read-only or trivially safe to retry."
    docs:
      - "../docs/flow-diagrams.md#45-saga--compensating-transaction-loop"
      - "../docs/decision-guide.md#quick-selection"

  - id: hard_reasoning_agent
    goal: "Answer questions or solve problems where a single reasoning pass is unreliable."
    base_pattern: "Test-Time Compute / Search"
    recommended_stack:
      - "Self-Consistency / Sample-and-Vote"
      - "Language Agent Tree Search (LATS)"
      - "Verifier / PRM-Guided Step Search"
      - "Run Receipt / Trace-First Runtime"
    required_primitives:
      - sample or search budget
      - answer/step scoring
      - vote or search-selection policy
    optional_patterns:
      - "Tree of Thoughts"
      - "Graph of Thoughts"
    failure_modes:
      - wrong answer on hard reasoning
      - runaway sample/branch cost
    avoid_when:
      - "The task is easy enough for reliable single-pass reasoning."
    docs:
      - "../docs/flow-diagrams.md#41-self-consistency--sample-and-vote"
      - "../docs/flow-diagrams.md#42-tree-search-with-verifier-lats--prm-guided-step-search"
      - "../docs/decision-guide.md#quick-selection"

  - id: cross_session_learning_agent
    goal: "Retain and reuse knowledge or skills across sessions instead of starting fresh each time."
    base_pattern: "Memory Runtime"
    recommended_stack:
      - "MemGPT-Style Memory Paging"
      - "Episodic Vector-Store Memory Retrieval Loop"
      - "Skill Library / Lifelong Skill-Acquisition Loop"
      - "Context Packing / Compression Loop"
    required_primitives:
      - persistent memory store
      - relevance retrieval
      - memory write policy
      - eviction or curation policy
    optional_patterns:
      - "Context Trust Zones"
      - "Memory Write-Manage-Read Loop"
    failure_modes:
      - stale or wrong memory retrieved
      - memory/skill library bloat
    avoid_when:
      - "The agent is stateless by design or sessions never repeat."
    docs:
      - "../docs/flow-diagrams.md#43-memgpt-style-memory-paging"
      - "../docs/decision-guide.md#quick-selection"

composition_recipes:
  reliable_tool_assistant:
    stack:
      - "Intent router"
      - "ReAct tool loop"
      - "Tool error recovery"
      - "Loop/token breaker"
      - "Verifier"
      - "Trace receipt"
  deep_research_agent:
    stack:
      - "Research loop"
      - "Source ledger"
      - "Context packing"
      - "Gap analysis"
      - "Citation verifier"
      - "Final synthesis"
  coding_agent:
    stack:
      - "Repo inspection"
      - "Plan/todos"
      - "Edit loop"
      - "Tests"
      - "Reviewer/verifier"
      - "Commit or handoff"
  multi_agent_operations_system:
    stack:
      - "Intent router"
      - "Supervisor or swarm"
      - "Worker agents"
      - "Typed results"
      - "Verifier"
      - "Run receipt"
  durable_background_agent:
    stack:
      - "Task queue"
      - "Worker lease"
      - "Checkpoint/status"
      - "Budget policy"
      - "HITL interrupt if risky"
      - "Retry/resume"
      - "Final artifact"

