techniques:
  - name: ReAct
    category: core_action_loop
    summary: Reasoning and acting are interleaved so the model can think, call a tool, observe the result, and continue.
    loop_shape: reason -> act -> observe -> repeat
    runtime_primitives:
      - tool calls
      - observations
      - stop condition
    solves:
      - environment interaction
      - stepwise tool use
    tradeoffs:
      - can drift in long contexts
      - weak termination unless wrapped by another loop
    sources:
      - title: "ReAct: Synergizing Reasoning and Acting in Language Models"
        url: "https://arxiv.org/abs/2210.03629"
        type: paper

  - name: Plan-and-Execute
    category: planning_loop
    summary: A planner decomposes the objective into steps and an executor carries them out, often revising the plan as new observations arrive.
    loop_shape: plan -> execute -> observe -> replan -> repeat
    runtime_primitives:
      - plan artifact
      - executor
      - replanning trigger
    solves:
      - task decomposition
      - long-horizon structure
    tradeoffs:
      - stale plans
      - planner/executor mismatch
    sources:
      - title: "Plan-and-Solve Prompting: Improving Zero-Shot Chain-of-Thought Reasoning by Large Language Models"
        url: "https://arxiv.org/abs/2305.04091"
        type: paper
      - title: "Plan-and-Execute Agents"
        url: "https://www.langchain.com/blog/planning-agents"
        type: article

  - name: ReWOO
    category: planning_loop
    summary: Reasoning is separated from observations so plans can include variable references to future tool outputs.
    loop_shape: plan with variables -> execute workers -> synthesize
    runtime_primitives:
      - planner
      - worker calls
      - variable binding
    solves:
      - tool-use planning
      - reduced repeated reasoning
    tradeoffs:
      - less reactive during execution
      - depends on plan quality
    sources:
      - title: "ReWOO: Decoupling Reasoning from Observations for Efficient Augmented Language Models"
        url: "https://arxiv.org/abs/2305.18323"
        type: paper

  - name: Reflexion
    category: reflection_loop
    summary: The agent evaluates its own trajectory, stores verbal feedback, and uses that feedback on later attempts.
    loop_shape: attempt -> evaluate -> reflect -> retry with memory
    runtime_primitives:
      - evaluator
      - reflection memory
      - retry
    solves:
      - learning across attempts without fine tuning
      - self-correction
    tradeoffs:
      - memory can accumulate wrong lessons
      - evaluator quality limits improvement
    sources:
      - title: "Reflexion: Language Agents with Verbal Reinforcement Learning"
        url: "https://arxiv.org/abs/2303.11366"
        type: paper

  - name: Ralph Loop
    category: bounded_retry_loop
    summary: Agent execution is explicitly bounded so the system can rely on failure, retry, or escalation rather than unbounded wandering.
    loop_shape: bounded attempt -> result/failure -> retry or escalate
    runtime_primitives:
      - step budget
      - time or cost budget
      - explicit failure
      - fresh context
    solves:
      - infinite loops
      - context exhaustion
      - operational reliability
    tradeoffs:
      - may lose useful context between attempts
      - needs good state handoff
    sources:
      - title: "The Ralph Loop"
        url: "https://ghuntley.com/ralph/"
        type: article

  - name: RLM / CodeAct REPL Loop
    category: repl_runtime_loop
    summary: The agent writes executable code into a REPL to manipulate context, call tools, and orchestrate sub-operations.
    loop_shape: write code -> execute -> inspect variables/output -> continue
    runtime_primitives:
      - REPL
      - variables
      - executable actions
      - recursive model calls
    solves:
      - programmatic context manipulation
      - complex tool orchestration
    tradeoffs:
      - ephemeral scripts unless persisted
      - safety and sandboxing matter
    sources:
      - title: "Executable Code Actions Elicit Better LLM Agents"
        url: "https://arxiv.org/abs/2402.01030"
        type: paper

  - name: Deep Research Loop
    category: research_loop
    summary: The system plans search queries, reads results, synthesizes findings, identifies gaps, and launches deeper query batches.
    loop_shape: plan queries -> search -> read -> synthesize -> plan next queries
    runtime_primitives:
      - query planner
      - web/search tools
      - source extraction
      - synthesis
      - gap analysis
    solves:
      - open-ended research
      - source-grounded synthesis
    tradeoffs:
      - source quality dominates answer quality
      - can over-search without clear stopping criteria
    sources:
      - title: "Introducing Deep Research"
        url: "https://openai.com/index/introducing-deep-research/"
        type: article

  - name: Codex Goal / Verifier Loop
    category: verification_loop
    summary: A goal is pursued through repeated execution and review until the objective is met, blocked, or failed.
    loop_shape: execute -> verify -> continue/fix/complete/block
    runtime_primitives:
      - objective
      - verifier
      - completion criteria
      - blocked state
    solves:
      - reliable task completion
      - explicit termination
    tradeoffs:
      - verifier can miss defects
      - objective wording matters
    sources:
      - title: "Using Goals in Codex"
        url: "https://developers.openai.com/codex/cloud#goals"
        type: docs

  - name: Autoresearch
    category: experiment_loop
    summary: The system iteratively proposes experiments, runs them, evaluates outcomes, and keeps or reverts changes based on results.
    loop_shape: propose -> run -> evaluate -> keep/revert -> repeat
    runtime_primitives:
      - experiment proposal
      - isolated run
      - metric evaluation
      - history
      - keep/revert decision
    solves:
      - open-ended optimization
      - experiment hillclimbing
    tradeoffs:
      - metric design is critical
      - exploration can get narrow
    sources:
      - title: "karpathy/autoresearch"
        url: "https://github.com/karpathy/autoresearch"
        type: code
    notes: "Placeholder source replaced. Karpathy's autoresearch is an autonomous ML experiment loop: an agent reads a human-written program.md, proposes one change to train.py, commits to a git branch, runs a fixed-duration training job, and keeps the commit (git commit) or reverts it (git reset) based on whether the target metric improved."

  - name: Planner / Executor Harness
    category: multi_agent_loop
    summary: Planner agents inspect state and produce tasks while executor agents perform tasks in parallel under fixed channels and guardrails.
    loop_shape: inspect -> plan tasks -> execute in parallel -> review -> next tasks
    runtime_primitives:
      - planner role
      - executor role
      - task queue
      - fixed channels
      - reviewer
    solves:
      - parallel task execution
      - role separation
      - large-work coordination
    tradeoffs:
      - coordination overhead
      - task boundaries can be wrong
    sources:
      - title: "MetaGPT: Meta Programming for a Multi-Agent Collaborative Framework"
        url: "https://arxiv.org/abs/2308.00352"
        type: paper
      - title: "Awesome Agent Orchestrators"
        url: "https://github.com/andyrewlee/awesome-agent-orchestrators"
        type: code
    notes: "See the MetaGPT SOP Agents entry for a fully-worked example of this harness with fixed roles."

  - name: Heartbeat / Checkpoint Loop
    category: durable_runtime_loop
    summary: A long-running agent periodically wakes, checks state or messages, emits structured checkpoints, and sleeps again.
    loop_shape: load state -> check/work -> checkpoint -> sleep -> repeat
    runtime_primitives:
      - persistent state
      - sleep
      - checkpoint
      - scheduler
      - lifecycle control
    solves:
      - long-running agents
      - operational visibility
      - background task management
    tradeoffs:
      - durability model is hard
      - state migrations and crash recovery matter
    sources:
      - title: "Designing a programmable runtime for agent orchestration"
        url: "https://x.com/i/article/2073112080140689408"
        type: article

  - name: Implement / Review / Merge
    category: coding_harness_loop
    summary: A coding agent implements a change, runs checks, receives review, fixes issues, and merges or hands off the result.
    loop_shape: implement -> test -> review -> fix -> merge/handoff
    runtime_primitives:
      - branch or worktree
      - implementation agent
      - tests
      - reviewer agent
      - merge or rollback
    solves:
      - safer code changes
      - auditable iteration
    tradeoffs:
      - weak tests weaken the loop
      - reviewer can share blind spots with implementer
    sources:
      - title: "SWE-bench"
        url: "https://www.swebench.com/"
        type: benchmark
      - title: "SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering"
        url: "https://arxiv.org/abs/2405.15793"
        type: paper

  - name: Blackboard / Shared Workspace Coordination
    category: multi_agent_coordination
    summary: Specialist agents coordinate through a shared workspace that stores tasks, claims, evidence, conflicts, and artifacts.
    loop_shape: goal -> blackboard -> agents post claims -> arbiter/synthesizer -> answer
    runtime_primitives:
      - shared blackboard state
      - capability subscriptions
      - claim and evidence records
      - conflict markers
      - arbiter or synthesizer
    solves:
      - loose multi-agent collaboration
      - inspectable partial work
    tradeoffs:
      - stale claims and noisy boards
      - arbitration can become a hidden supervisor
    sources:
      - title: "Blackboard Multi-Agent Systems for Information Discovery in Data Science"
        url: "https://research.google/pubs/blackboard-multi-agent-systems-for-information-discovery-in-data-science/"
        type: paper

  - name: Multi-Agent Debate / Committee Deliberation
    category: multi_agent_deliberation
    summary: Multiple agents independently propose answers, critique one another over debate rounds, and converge through a judge, vote, or stability check.
    loop_shape: propose -> debate -> judge/vote -> final
    runtime_primitives:
      - proposer agents
      - debate transcript
      - round budget
      - aggregation policy
      - convergence criterion
    solves:
      - reasoning diversity
      - contradiction discovery
    tradeoffs:
      - high token and latency cost
      - weak agents can reinforce wrong consensus
    sources:
      - title: "Improving Factuality and Reasoning in Language Models through Multiagent Debate"
        url: "https://arxiv.org/abs/2305.14325"
        type: paper

  - name: Agent-as-Judge / Referee Team
    category: evaluation_runtime
    summary: Judge agents score candidate artifacts against a rubric and route the workflow to accept, revise, reject, or escalate.
    loop_shape: candidate -> judge -> accept/revise/reject
    runtime_primitives:
      - rubric
      - judge agent or panel
      - score schema
      - acceptance threshold
      - revision route
    solves:
      - explicit quality gates
      - runtime evaluation
    tradeoffs:
      - judge bias
      - rubric calibration
    sources:
      - title: "Enhancing LLM-as-a-Judge via Multi-Agent Collaboration"
        url: "https://cdn.amazon.science/48/5d/20927f094559a4465916e28f41b5/enhancing-llm-as-a-judge-via-multi-agent-collaboration.pdf"
        type: paper

  - name: A2A / Agent Interoperability Protocol Layer
    category: agent_interop_protocol
    summary: Remote agents are discovered and invoked through capability manifests, task IDs, streaming status, and artifact contracts.
    loop_shape: discover agent card -> send/stream task -> status/artifacts -> complete
    runtime_primitives:
      - agent card
      - authenticated endpoint
      - task ID
      - status contract
      - artifacts
    solves:
      - cross-framework delegation
      - long-running remote agent work
    tradeoffs:
      - trust and auth complexity
      - hidden remote implementation details
    sources:
      - title: "Announcing the Agent2Agent Protocol"
        url: "https://developers.googleblog.com/en/a2a-a-new-era-of-agent-interoperability/"
        type: article

  - name: MCP Tool / Context Protocol Layer
    category: tool_context_protocol
    summary: Tools, resources, and prompts are exposed by protocol servers and invoked by model hosts through clients.
    loop_shape: host -> client -> server -> tool/resource/prompt -> result
    runtime_primitives:
      - host
      - client
      - server
      - tool schema
      - resources
      - prompts
    solves:
      - portable tool integration
      - schema-based context/tool discovery
    tradeoffs:
      - still needs host-side authorization
      - protocol plumbing is not agent reasoning
    sources:
      - title: "Model Context Protocol Specification"
        url: "https://modelcontextprotocol.io/specification/2025-06-18"
        type: spec

  - name: HITL Interrupt / Approval Gate
    category: human_in_the_loop
    summary: Risky actions pause at a checkpoint for a human approve, edit, or reject decision before the run resumes.
    loop_shape: proposed action -> policy -> interrupt -> human decision -> resume
    runtime_primitives:
      - risk policy
      - pending action record
      - interrupt checkpoint
      - human decision
      - resume semantics
    solves:
      - risky action governance
      - human approval without losing runtime state
    tradeoffs:
      - approval fatigue
      - policy tuning
    sources:
      - title: "Human-in-the-loop"
        url: "https://docs.langchain.com/oss/python/langchain/human-in-the-loop"
        type: docs

  - name: Guardrail Pipeline
    category: runtime_policy
    summary: Runtime policy stages inspect inputs, tool calls, handoffs, and outputs and can block, transform, escalate, or continue.
    loop_shape: input guardrails -> model/tool/handoff -> output guardrails -> route
    runtime_primitives:
      - input guardrails
      - tool guardrails
      - handoff policy
      - output guardrails
      - trace event
    solves:
      - boundary-specific safety checks
      - inspectable policy failures
    tradeoffs:
      - false positives
      - coverage gaps between runtime boundaries
    sources:
      - title: "OpenAI Agents SDK Guardrails"
        url: "https://openai.github.io/openai-agents-python/guardrails/"
        type: docs

  - name: Run Receipt / Trace-First Runtime
    category: observability
    summary: Agent runs emit structured records of model calls, tool calls, handoffs, guardrails, artifacts, costs, and final state.
    loop_shape: run -> trace events -> inspect/evaluate/replay
    runtime_primitives:
      - run ID
      - trace spans
      - artifact links
      - cost records
      - redaction policy
    solves:
      - debugging
      - audit
      - evaluation over real runs
    tradeoffs:
      - traces can leak private context
      - logs without replay are only partially useful
    sources:
      - title: "OpenAI Agents SDK Tracing"
        url: "https://openai.github.io/openai-agents-python/tracing/"
        type: docs

  - name: Context Packing / Compression Loop
    category: context_runtime
    summary: The runtime ranks, filters, packs, summarizes, or drops context before model calls and updates summaries after the run.
    loop_shape: sources -> rank/filter -> pack -> budget check -> summarize/drop -> model
    runtime_primitives:
      - source inventory
      - relevance ranker
      - context budget
      - summary artifacts
      - compression trigger
    solves:
      - long-running context management
      - prompt budget pressure
    tradeoffs:
      - important details can be compressed away
      - hidden summaries need provenance
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Task Queue / Resumable Workflow Runtime
    category: durable_runtime
    summary: Agent work is represented as durable tasks that can checkpoint, report status, retry, sleep, and resume after failure.
    loop_shape: request -> enqueue -> worker -> checkpoint/status -> resume/retry/done
    runtime_primitives:
      - task ID
      - queue
      - worker lease
      - checkpoint
      - status contract
      - retry/backoff
    solves:
      - background agent work
      - long-running execution
      - crash recovery
    tradeoffs:
      - idempotency requirements
      - partial side effects need compensation
    sources:
      - title: "LangGraph overview"
        url: "https://docs.langchain.com/oss/python/langgraph/overview"
        type: docs

  - name: Stateful Harness Around Pure Agent Loop
    category: harness_runtime
    summary: A reusable harness owns transcript, queueing, cancellation, listeners, and repair semantics while delegating model/tool execution to a stateless loop that emits provider-neutral events.
    loop_shape: frontend/session -> harness state -> pure loop -> provider-neutral events -> frontend/session
    runtime_primitives:
      - caller-owned transcript
      - pure loop function
      - provider-neutral event stream
      - steering queue
      - follow-up queue
      - single-runner invariant
      - cancellation token
      - interrupted tool-call repair
    solves:
      - reusable agent brain across frontends
      - safe interactive steering
      - transcript validity after cancellation
      - separation of core loop from UI and session concerns
    tradeoffs:
      - outer layer still owns durable persistence
      - queue semantics need clear UX
      - transcript mutation needs single-runner protection
    sources:
      - title: "Tau AgentHarness"
        url: "https://github.com/huggingface/tau/blob/main/src/tau_agent/harness.py"
        type: code
      - title: "Tau pure agent loop"
        url: "https://github.com/huggingface/tau/blob/main/src/tau_agent/loop.py"
        type: code

  - name: Prompt-Injection Action Firewall
    category: runtime_security
    summary: Screen proposed tool calls and external actions against original user intent and trust-zone labels before execution.
    loop_shape: user intent -> untrusted context -> proposed action -> action screening -> allow/block/escalate
    runtime_primitives:
      - original intent record
      - trust-zone labels
      - proposed action record
      - action screening guardrail
      - block/allow/human route
      - audit event
    solves:
      - indirect prompt injection
      - tool-call drift
      - data exfiltration through tools
    tradeoffs:
      - false positives can interrupt useful work
      - screening policy needs task context
    sources:
      - title: "OWASP LLM01 Prompt Injection"
        url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
        type: guide
      - title: "OWASP LLM Prompt Injection Prevention Cheat Sheet"
        url: "https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html"
        type: guide

  - name: Capability / Least-Privilege Runtime
    category: access_control
    summary: Grant only the scoped tools and data access required for a task, then revoke or expire capabilities after the run.
    loop_shape: task intent -> derive capabilities -> grant scoped tools/data -> run -> revoke/audit
    runtime_primitives:
      - capability manifest
      - scoped tool grants
      - data-access scopes
      - expiry/revocation
      - audit log
    solves:
      - excessive agency
      - accidental public or destructive action
      - credential leakage
    tradeoffs:
      - requires capability modeling
      - may block under-specified tasks
    sources:
      - title: "OpenAI agent builder safety guide"
        url: "https://developers.openai.com/api/docs/guides/agent-builder-safety"
        type: guide

  - name: Runtime Budget Policy Engine
    category: budget_enforcement
    summary: Enforce token, time, tool-call, cost, and delegation budgets with warning thresholds and hard-stop behavior.
    loop_shape: run -> budget policy -> warn/compress/downshift -> hard-stop/checkpoint
    runtime_primitives:
      - token budget
      - time budget
      - tool-call budget
      - cost budget
      - depth/handoff budget
      - hard-stop action
    solves:
      - unbounded consumption
      - runaway loops
      - hidden cost spikes
    tradeoffs:
      - hard limits can stop useful work
      - needs careful resume or summary behavior
    sources:
      - title: "OWASP Top 10 for LLM Applications"
        url: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
        type: guide

  - name: Tool Reliability Scoring and Fallback
    category: tool_runtime
    summary: Track tool success, errors, latency, schema mismatch, and quality to select primary, fallback, quarantine, or human routes.
    loop_shape: tool call -> outcome record -> reliability score -> primary/fallback/quarantine route
    runtime_primitives:
      - tool registry
      - schema diagnostics
      - success/error counters
      - latency records
      - fallback tools
      - quarantine state
    solves:
      - repeated broken tool calls
      - schema drift
      - unreliable tool selection
    tradeoffs:
      - reliability scoring needs history
      - fallback behavior can hide root causes
    sources:
      - title: "OpenClaw/Hermes technique notes"
        url: "docs/openclaw-hermes-techniques.md"
        type: local

  - name: Artifact Provenance Graph
    category: provenance
    summary: Store relationships from sources and tool calls to claims, artifacts, transformations, and final answers.
    loop_shape: source/tool/model step -> claim/artifact -> provenance edge -> audit/replay/citation
    runtime_primitives:
      - artifact IDs
      - claim IDs
      - source IDs
      - provenance edges
      - transformation records
      - redaction policy
    solves:
      - citation mismatch
      - untraceable generated artifacts
      - audit gaps
    tradeoffs:
      - provenance graph maintenance costs storage and discipline
      - redaction policy becomes critical
    sources:
      - title: "OpenTelemetry GenAI semantic conventions"
        url: "https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-agent-spans/"
        type: spec

  - name: Append-Only Session Event Log / Branchable Replay
    category: durable_session_runtime
    summary: Persist typed session entries append-only, reconstruct state by replay, and support branch paths, compaction entries, and active leaf selection.
    loop_shape: append typed entry -> replay entries -> derive active state -> branch/compact/resume
    runtime_primitives:
      - append-only storage
      - typed session entries
      - parent IDs
      - active leaf pointer
      - root-to-leaf replay
      - compaction entries
    solves:
      - durable resume
      - branchable conversations
      - audit-friendly compaction
    tradeoffs:
      - replay code must reject cycles and missing entries
      - compaction must preserve provenance
    sources:
      - title: "Tau session primitives"
        url: "https://github.com/huggingface/tau/tree/main/src/tau_agent/session"
        type: code

  - name: Supervisor Architecture
    category: multi_agent_orchestration
    summary: A central supervisor agent receives user input, delegates to worker agents, and produces or forwards the final user-facing response.
    loop_shape: user -> supervisor -> worker -> supervisor -> user
    runtime_primitives:
      - supervisor agent
      - worker/subagent registry
      - delegation or handoff tools
      - result return channel
      - optional forward_message tool
      - delegation ledger
      - continuation limits
    solves:
      - central governance over multi-agent work
      - auditable delegation to black-box or third-party workers
    tradeoffs:
      - translation loss when the supervisor paraphrases worker output
      - coordinator bottleneck and higher token cost
      - delegation loops need explicit breakers
    sources:
      - title: "OpenAI Swarm"
        url: "https://github.com/openai/swarm"
        type: code
      - title: "LangGraph Supervisor reference"
        url: "https://reference.langchain.com/python/langgraph-supervisor"
        type: docs
      - title: "Benchmarking Multi-Agent Architectures"
        url: "https://www.langchain.com/blog/benchmarking-multi-agent-architectures"
        type: article
    notes: "See docs/supervisor-swarm-techniques.md for the full supervisor-vs-swarm comparison."

  - name: Swarm Architecture
    category: multi_agent_orchestration
    summary: Agents hand off control directly to one another based on specialization; the active agent can respond to the user without routing through a central coordinator.
    loop_shape: user -> active agent -> handoff -> next active agent -> user
    runtime_primitives:
      - active agent state
      - agent-to-agent handoff tools
      - context variables passed between agents
      - last-active-agent memory
      - max turns
    solves:
      - low-overhead specialist routing
      - direct responses without supervisor paraphrase loss
    tradeoffs:
      - weaker central coordination
      - agents may need awareness of peer capabilities
      - handoff loops need turn limits and observability
    sources:
      - title: "OpenAI Swarm"
        url: "https://github.com/openai/swarm"
        type: code
      - title: "LangGraph Swarm"
        url: "https://github.com/langchain-ai/langgraph-swarm-py"
        type: code
    notes: "See docs/supervisor-swarm-techniques.md for the full supervisor-vs-swarm comparison."

  - name: Hierarchical Supervisor Tree
    category: multi_agent_orchestration
    summary: A root supervisor delegates to domain supervisors, which delegate to leaf agents, aggregating results back up the tree to the root.
    loop_shape: root supervisor -> domain supervisor -> leaf agents -> domain supervisor -> root supervisor -> user
    runtime_primitives:
      - multi-level supervisor tree
      - per-level delegation limits
      - result aggregation
      - explicit ownership boundaries
    solves:
      - scaling supervision across domains too large for one supervisor
    tradeoffs:
      - added coordination cost at each tree level
      - more places for information loss between levels
    sources:
      - title: "CrewAI hierarchical process"
        url: "https://docs.crewai.com/v1.15.0/en/concepts/processes"
        type: docs

  - name: Context Trust Zones
    category: runtime_security
    summary: The runtime tracks where each piece of context came from and how much authority it has, so untrusted content stays evidence rather than instruction.
    loop_shape: context source -> trust-zone classification -> packing/policy -> model/tool boundary
    runtime_primitives:
      - source labels
      - trust-zone metadata
      - context packing rules
      - quote/evidence boundaries
      - provenance links
    solves:
      - instruction/data confusion
      - summary laundering of malicious source text
      - unsafe memory updates from untrusted content
    tradeoffs:
      - requires consistent trust labeling across every context source
      - adds packing-policy complexity
    sources:
      - title: "OWASP LLM01 Prompt Injection"
        url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
        type: guide
      - title: "OWASP LLM Prompt Injection Prevention Cheat Sheet"
        url: "https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html"
        type: guide

  - name: Least-to-Most Prompting
    category: query_decomposition
    summary: A hard problem is decomposed into an ordered sequence of simpler subproblems, each solved using the answers to the previous subproblems.
    loop_shape: decompose into subproblems -> solve subproblem using prior answers -> repeat until final subproblem solved
    runtime_primitives:
      - decomposition step
      - ordered subproblem list
      - sequential answer chaining
    solves:
      - compositional generalization on hard multi-step reasoning
      - tasks harder than any single few-shot example
    tradeoffs:
      - decomposition quality bounds final accuracy
      - subproblem ordering must respect real dependencies
    sources:
      - title: "Least-to-Most Prompting Enables Complex Reasoning in Large Language Models"
        url: "https://arxiv.org/abs/2205.10625"
        type: paper

  - name: Tree of Thoughts
    category: test_time_compute
    summary: The model explores multiple reasoning branches as a tree, evaluates intermediate thoughts, and searches toward a solution instead of committing to one linear chain.
    loop_shape: generate candidate thoughts -> evaluate/score thoughts -> expand best branches or backtrack -> repeat until solved or budget exhausted
    runtime_primitives:
      - thought generator
      - state evaluator
      - search strategy (BFS/DFS)
      - backtracking
      - branch budget
    solves:
      - problems needing exploration or lookahead that one reasoning chain cannot recover from
    tradeoffs:
      - multiplies token/latency cost by branching factor
      - needs a hard search budget
    sources:
      - title: "Tree of Thoughts: Deliberate Problem Solving with Large Language Models"
        url: "https://arxiv.org/abs/2305.10601"
        type: paper
      - title: "tree-of-thought-llm"
        url: "https://github.com/princeton-nlp/tree-of-thought-llm"
        type: code

  - name: Self-Ask with Search
    category: query_analysis
    summary: The model decides whether a question needs decomposition, explicitly asks itself follow-up questions, and can route each follow-up to a search tool before composing the final answer.
    loop_shape: question -> need follow-up? -> ask follow-up -> search/answer follow-up -> repeat -> final answer
    runtime_primitives:
      - follow-up decision
      - follow-up question generation
      - search routing
      - intermediate answer tracking
    solves:
      - compositional QA requiring explicit decomposition before retrieval
    tradeoffs:
      - extra follow-up turns cost latency
      - follow-up question quality gates final accuracy
    sources:
      - title: "Measuring and Narrowing the Compositionality Gap in Language Models"
        url: "https://arxiv.org/abs/2210.03350"
        type: paper
      - title: "self-ask"
        url: "https://github.com/ofirpress/self-ask"
        type: code

  - name: HyDE (Hypothetical Document Embeddings)
    category: context_acquisition
    summary: The model first generates a hypothetical answer document, embeds it, and uses that embedding to retrieve real documents that are semantically closer to the answer than the raw query would be.
    loop_shape: query -> generate hypothetical document -> embed hypothetical document -> retrieve nearest real documents -> answer
    runtime_primitives:
      - hypothetical-document generator
      - embedding model
      - vector retrieval
    solves:
      - zero-shot dense retrieval when the query and answer live in different semantic spaces
    tradeoffs:
      - hallucinated hypothetical content can bias retrieval
      - adds one generation step before retrieval
    sources:
      - title: "Precise Zero-Shot Dense Retrieval without Relevance Labels"
        url: "https://arxiv.org/abs/2212.10496"
        type: paper
      - title: "hyde"
        url: "https://github.com/texttron/hyde"
        type: code

  - name: Toolformer
    category: tool_use_learning
    summary: The model learns, in a self-supervised way, when and how to call external APIs by inserting API calls into its own training text and keeping only calls that improve next-token prediction.
    loop_shape: sample candidate API calls -> execute -> keep call if it improves prediction -> fine-tune on filtered examples
    runtime_primitives:
      - candidate API call sampling
      - API execution
      - filtering by prediction improvement
      - self-supervised fine-tuning data
    solves:
      - teaching a model tool-use timing without hand-labeled tool-use examples
    tradeoffs:
      - a training-time technique, not an adaptive runtime control loop
      - tool-use behavior is fixed at fine-tuning time
    sources:
      - title: "Toolformer: Language Models Can Teach Themselves to Use Tools"
        url: "https://arxiv.org/abs/2302.04761"
        type: paper

  - name: Self-RAG
    category: adaptive_retrieval
    summary: The model learns to decide when to retrieve, retrieves on demand, and critiques its own generations and retrieved passages using special reflection tokens.
    loop_shape: decide retrieve? -> retrieve if needed -> generate segment -> self-critique relevance/support/usefulness -> continue or revise
    runtime_primitives:
      - retrieval-decision token
      - retrieved-passage critique
      - generation critique
      - reflection tokens
    solves:
      - unnecessary or low-quality retrieval
      - weak factuality and citation support
    tradeoffs:
      - requires special training for reflection tokens
      - critique quality bounds correction quality
    sources:
      - title: "Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflection"
        url: "https://arxiv.org/abs/2310.11511"
        type: paper
      - title: "Self-RAG project page"
        url: "https://selfrag.github.io/"
        type: article

  - name: Corrective RAG
    category: retrieval_correction_loop
    summary: A lightweight retrieval evaluator grades retrieved documents as correct, ambiguous, or incorrect, then triggers web search or knowledge refinement to correct weak retrieval before generation.
    loop_shape: retrieve -> grade retrieval quality -> correct/refine or supplement with web search -> generate
    runtime_primitives:
      - retrieval evaluator
      - correction/refinement action
      - web-search fallback
      - knowledge refinement
    solves:
      - bad or irrelevant retrieval propagating into generation
    tradeoffs:
      - the evaluator becomes a new failure point
      - added latency for the correction step
    sources:
      - title: "Corrective Retrieval Augmented Generation"
        url: "https://arxiv.org/abs/2401.15884"
        type: paper

  - name: SWE-agent / Agent-Computer Interface
    category: coding_harness_loop
    summary: A purpose-built agent-computer interface (custom commands for search, view, and edit) replaces raw shell access, measurably improving coding agent success independent of the underlying model.
    loop_shape: ACI command -> structured environment feedback -> next ACI command -> ... -> submit patch
    runtime_primitives:
      - custom search/view/edit commands
      - structured environment feedback
      - patch submission
      - sandboxed execution
    solves:
      - poor tool ergonomics limiting coding agent performance
    tradeoffs:
      - interface design itself becomes a tuning surface
      - benchmark results are coupled to the model-and-interface pair
    sources:
      - title: "SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering"
        url: "https://arxiv.org/abs/2405.15793"
        type: paper
      - title: "swe-agent"
        url: "https://github.com/swe-agent/swe-agent"
        type: code

  - name: AutoGen Multi-Agent Conversations
    category: multi_agent_framework
    summary: Agents are defined as conversable entities that exchange messages under configurable conversation patterns (two-agent chat, group chat, nested chats) to complete tasks.
    loop_shape: define conversable agents -> configure conversation pattern -> agents exchange messages -> termination condition -> result
    runtime_primitives:
      - conversable agent abstraction
      - conversation pattern configuration
      - group chat manager
      - termination condition
      - human-input modes
    solves:
      - flexible multi-agent conversation patterns without hardcoding one topology
    tradeoffs:
      - benchmark signal is diffuse because it is a general infrastructure layer, not one measured technique
    sources:
      - title: "AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation"
        url: "https://arxiv.org/abs/2308.08155"
        type: paper
      - title: "AutoGen docs"
        url: "https://microsoft.github.io/autogen/0.2/docs/Use-Cases/agent_chat/"
        type: docs

  - name: MetaGPT SOP Agents
    category: multi_agent_workflow
    summary: Agents are assigned software-engineering roles (PM, architect, engineer, QA) and communicate through standardized operating procedures and structured artifacts instead of free-form chat.
    loop_shape: role assignment -> SOP-defined artifact handoff (PRD -> design -> code -> tests) -> review -> next role
    runtime_primitives:
      - role definitions
      - SOP artifact schemas
      - structured handoff documents
      - review gates
    solves:
      - miscommunication in multi-agent software generation via standardized artifacts
    tradeoffs:
      - harder to isolate the SOP benefit from underlying model capability
      - rigid SOPs can be a poor fit for atypical tasks
    sources:
      - title: "MetaGPT: Meta Programming for a Multi-Agent Collaborative Framework"
        url: "https://arxiv.org/abs/2308.00352"
        type: paper

  - name: Intent / Context / Routing Front Door
    category: query_routing
    summary: Incoming requests are analyzed for task type and risk, optionally enriched with retrieved context, then routed to a direct answer, tool loop, workflow, or clarification path.
    loop_shape: intent analysis -> need more context? -> retrieve/shape context -> route to answer/tool/workflow/clarify
    runtime_primitives:
      - intent classifier
      - risk/SLA tagging
      - context retrieval trigger
      - context shaping
      - route dispatcher
    solves:
      - unnecessary agent loops for simple requests
      - matching task type to the right runtime pattern
    tradeoffs:
      - misclassification routes tasks to the wrong pattern
      - adds a decision step before every request
    sources: []
    notes: "Intent should be classified by a model call or trained classifier, not hardcoded keyword matching, since real user intent is open-ended. No single canonical primary source identified yet; extracted from this repo's own flow-diagram and decision-guide analysis."

  - name: Plan-Mode Todo Loop
    category: planning_loop
    summary: The agent maintains an explicit todo list with exactly one item in progress at a time, giving visible progress tracking without a separate planner role.
    loop_shape: write todos -> mark one in progress -> execute -> mark complete -> next todo
    runtime_primitives:
      - todo list state
      - single-in-progress discipline
      - write_todos tool
      - completion tracking
    solves:
      - visible progress on multi-step tasks without full planner/executor overhead
    tradeoffs:
      - todos can go stale if not revisited
      - does not replace a real replanning trigger
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Steering and Follow-Up Queues
    category: harness_runtime
    summary: A running agent accepts queued user messages, injecting steering input at the next safe turn/tool boundary and follow-up input only when the agent would otherwise stop.
    loop_shape: agent running -> user sends message -> queue as steering or follow-up -> drain at safe boundary -> continue loop
    runtime_primitives:
      - steering queue
      - follow-up queue
      - queue drain callback
      - single-runner invariant
    solves:
      - letting a user influence or queue instructions for an active run without racing the transcript
    tradeoffs:
      - queue semantics need clear UX so users understand steer vs. follow-up
    sources:
      - title: "Tau AgentHarness"
        url: "https://github.com/huggingface/tau/blob/main/src/tau_agent/harness.py"
        type: code

  - name: Evaluator / Optimizer Loop
    category: verification_loop
    summary: A draft is scored by a separate evaluator prompt against a rubric; failing drafts go through a targeted optimizer rewrite instead of a full regeneration, bounded by a loop budget.
    loop_shape: draft -> trigger present? -> separate evaluator -> passed? -> output or optimizer rewrite -> re-evaluate
    runtime_primitives:
      - rubric
      - separate evaluator prompt
      - trigger condition
      - optimizer rewrite
      - loop budget
    solves:
      - self-preference bias from letting a model judge its own output
      - wasted full-rewrites on minor issues
    tradeoffs:
      - only helps when a trigger reliably fires
      - adds latency for every evaluated draft
    sources:
      - title: "OpenClaw/Hermes technique notes"
        url: "docs/openclaw-hermes-techniques.md"
        type: local

  - name: Loop Detection Circuit Breaker
    category: bounded_retry_loop
    summary: The runtime hashes tool calls and salient arguments, warns after a repeat threshold, and strips tool calls to force a final answer at a hard limit.
    loop_shape: hash tool call -> repeated? -> below warn continue, warn threshold inject warning, hard limit strip tools and force final answer
    runtime_primitives:
      - call hashing
      - repeat counter
      - warn threshold
      - hard limit
      - tool-call stripping
    solves:
      - infinite or near-infinite repeated tool-call loops
    tradeoffs:
      - hashing must tolerate near-duplicate calls without over- or under-triggering
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Token Budget Circuit Breaker
    category: budget_enforcement
    summary: The runtime sums input/output/total token usage per run, warns near a threshold, and hard-stops by stripping tools and forcing a final answer at the limit.
    loop_shape: sum run tokens -> under warn continue, near limit inject warning, hard stop strip tools and finalize
    runtime_primitives:
      - token accounting
      - warn threshold
      - hard-stop action
      - subagent token attribution
    solves:
      - runaway token consumption and hidden cost spikes within a single run
    tradeoffs:
      - a hard stop can cut off useful work mid-task without a summary/resume path
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Deferred Tool Discovery
    category: tool_runtime
    summary: Large tool catalogs stay hidden behind a tool_search call; matching schemas are promoted into the active tool list only when the agent searches for them, scoped by a catalog hash.
    loop_shape: agent sees deferred tool names -> needs hidden tool? -> tool_search(query) -> promote matched schema -> tool becomes callable
    runtime_primitives:
      - deferred tool catalog
      - tool_search tool
      - catalog-hash scoping
      - schema promotion
    solves:
      - huge MCP/tool catalogs overflowing model context
    tradeoffs:
      - catalog-hash scoping must be correct or stale tool names can leak drifted tools
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Read-Before-Write File Gate
    category: coding_harness_loop
    summary: Write or edit tools are blocked on an existing file unless the agent holds a current read mark for that file's content, preventing stale or append-only edits.
    loop_shape: write/edit call -> file exists? -> has current read mark? -> allow write and invalidate mark, or block with error
    runtime_primitives:
      - read mark
      - content-hash tie to read mark
      - write gate
      - per-scope lock
    solves:
      - duplicated content from repeated appends
      - edits against stale file versions
    tradeoffs:
      - requires every edit path to go through the same gate to be effective
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Dangling Tool-Call Repair
    category: tool_runtime
    summary: Before the next model call, the runtime scans for assistant tool calls with no matching tool result and inserts a synthetic failed result so the transcript stays valid for strict providers.
    loop_shape: scan history for tool_calls -> matching results exist? -> leave unchanged, or insert synthetic error result
    runtime_primitives:
      - tool-call scan
      - synthetic error tool result
      - pre-request repair step
    solves:
      - malformed transcripts after cancellation, interruption, or partial provider output
    tradeoffs:
      - repair must run consistently before every provider request, including after resume
    sources:
      - title: "Tau AgentHarness"
        url: "https://github.com/huggingface/tau/blob/main/src/tau_agent/harness.py"
        type: code

  - name: Subagent Task Tool With Status Contract
    category: multi_agent_loop
    summary: A lead agent delegates to typed subagents through a task tool that starts a background run and exposes started/running/completed/failed/cancelled/timed_out status for polling.
    loop_shape: task(description, prompt, subagent) -> validate type/permissions -> start background run -> poll status -> return result or structured error
    runtime_primitives:
      - typed subagent registry
      - background run handle
      - status contract
      - token/trace attribution
    solves:
      - fan-out to specialized subagents with observable lifecycle instead of opaque black-box calls
    tradeoffs:
      - the status contract must be honest or callers cannot distinguish stuck from working
    sources:
      - title: "DeerFlow technique notes"
        url: "docs/deer-flow-techniques.md"
        type: local

  - name: Heartbeat Structured Checkpoint Response
    category: durable_runtime_loop
    summary: Each heartbeat wakeup returns a structured outcome (no_change, progress, done, blocked, needs_attention) instead of free text, making the durable loop operable.
    loop_shape: heartbeat wake -> do work or check -> emit structured outcome -> notify if worth interrupting -> sleep
    runtime_primitives:
      - structured outcome enum
      - notify flag
      - priority
      - next-check hint
    solves:
      - heartbeat loops producing rote chatter instead of actionable status
    tradeoffs:
      - the outcome taxonomy must stay small enough to remain meaningful
    sources:
      - title: "OpenClaw/Hermes technique notes"
        url: "docs/openclaw-hermes-techniques.md"
        type: local

  - name: Self-Consistency / Sample-and-Vote
    category: test_time_compute
    summary: Instead of greedy decoding, the model samples multiple diverse reasoning paths for the same prompt and selects the final answer by majority vote across paths.
    loop_shape: sample N reasoning paths -> extract final answer from each -> majority vote -> output
    runtime_primitives:
      - temperature-based sampling
      - answer extraction
      - vote aggregation
      - sample budget N
    solves:
      - unreliable single-path reasoning on arithmetic, commonsense, and symbolic tasks
    tradeoffs:
      - cost scales linearly with sample count N
      - only applicable to tasks with a comparable/votable final answer
    sources:
      - title: "Self-Consistency Improves Chain of Thought Reasoning in Language Models"
        url: "https://arxiv.org/abs/2203.11171"
        type: paper

  - name: Language Agent Tree Search (LATS)
    category: test_time_compute
    summary: Combines Monte Carlo Tree Search with LM-generated actions, self-reflection, and external environment feedback to search over reasoning-and-acting trajectories rather than committing to one path.
    loop_shape: select node (UCB) -> expand with LM actions -> evaluate via self-reflection/environment -> backpropagate value -> repeat until budget exhausted
    runtime_primitives:
      - search tree
      - UCB selection
      - LM value function
      - self-reflection
      - environment feedback
      - backpropagation
    solves:
      - decision-making tasks needing lookahead and correction beyond single-pass ReAct
    tradeoffs:
      - 5-20x more LLM calls than simple ReAct
      - needs an environment that can give feedback
    sources:
      - title: "Language Agent Tree Search Unifies Reasoning, Acting, and Planning in Language Models"
        url: "https://arxiv.org/abs/2310.04406"
        type: paper
      - title: "LanguageAgentTreeSearch"
        url: "https://github.com/lapisrocks/LanguageAgentTreeSearch"
        type: code

  - name: Graph of Thoughts
    category: test_time_compute
    summary: Model-generated thoughts are modeled as vertices in an arbitrary graph with edges as dependencies, enabling aggregation, feedback loops, and merging of multiple reasoning branches beyond a strict tree.
    loop_shape: generate thought nodes -> connect via transformations (aggregate/refine/generate) -> score nodes -> select best node or continue transforming
    runtime_primitives:
      - thought graph
      - transformation operations
      - node scoring
      - graph controller
    solves:
      - tasks that benefit from merging or looping over partial results rather than a single linear or tree-shaped chain
    tradeoffs:
      - graph controller design is task-specific
      - more complex to implement than Tree of Thoughts
    sources:
      - title: "Graph of Thoughts: Solving Elaborate Problems with Large Language Models"
        url: "https://arxiv.org/abs/2308.09687"
        type: paper
      - title: "graph-of-thoughts"
        url: "https://github.com/spcl/graph-of-thoughts"
        type: code

  - name: Verifier / PRM-Guided Step Search
    category: test_time_compute
    summary: A process-supervised reward model scores each intermediate reasoning step rather than only the final answer, and the runtime uses those step scores to guide or prune search.
    loop_shape: generate candidate steps -> score each step with PRM -> keep/expand high-scoring steps -> continue to final answer
    runtime_primitives:
      - process reward model
      - step-level scoring
      - search/pruning policy
    solves:
      - reward hacking and error accumulation from outcome-only verification on long reasoning chains
    tradeoffs:
      - requires a trained step-level reward model, which is expensive to build and can itself be miscalibrated
    sources:
      - title: "Let's Verify Step by Step"
        url: "https://arxiv.org/abs/2305.20050"
        type: paper
    notes: "Distinct from the Codex Goal / Verifier Loop entry: that loop verifies final outcomes, this technique scores intermediate reasoning steps to guide search."

  - name: MemGPT-Style Memory Paging
    category: memory_runtime
    summary: An OS-inspired virtual context manager pages information between a limited main context window and external archival/recall storage, letting the model manage its own memory through function calls.
    loop_shape: context near limit -> page out low-relevance content to external storage -> page in relevant external content on demand -> continue
    runtime_primitives:
      - main context tier
      - external archival/recall storage
      - page-in/page-out function calls
      - self-editing memory
    solves:
      - conversations and documents that exceed the model's fixed context window
    tradeoffs:
      - paging decisions are model-driven and can misjudge relevance
      - adds function-call overhead
    sources:
      - title: "MemGPT: Towards LLMs as Operating Systems"
        url: "https://arxiv.org/abs/2310.08560"
        type: paper

  - name: Episodic Vector-Store Memory Retrieval Loop
    category: memory_runtime
    summary: Past interactions or facts are embedded and stored in a vector store; the runtime retrieves the most relevant memories by similarity before each turn and can write new memories after.
    loop_shape: turn starts -> embed query -> retrieve top-k similar memories -> inject into context -> turn ends -> embed and store new memory
    runtime_primitives:
      - embedding model
      - vector store
      - similarity retrieval
      - memory write policy
    solves:
      - long-term recall across sessions without keeping full history in context
    tradeoffs:
      - similarity retrieval can miss relevant memories that are not lexically/semantically close
      - stale memories accumulate without an eviction policy
    sources: []
    notes: "Widely implemented across memory frameworks; no single canonical primary paper identified yet. Contrast with MemGPT-style paging, which manages a hierarchy of storage tiers rather than a flat similarity index."

  - name: Skill Library / Lifelong Skill-Acquisition Loop
    category: reflection_loop
    summary: The agent turns successful task solutions into reusable, named skills (executable code or procedural patterns) stored in a growing library, and retrieves relevant skills before attempting new tasks.
    loop_shape: attempt task -> succeeds? -> propose skill -> verify -> add to library -> retrieve relevant skills on future tasks
    runtime_primitives:
      - skill proposal
      - skill verification
      - skill library storage
      - relevance retrieval
      - retrieval cap
    solves:
      - repeating the same discovery work across tasks or sessions
    tradeoffs:
      - the library can accumulate low-quality or narrow skills without curation
      - retrieval must stay selective to avoid context bloat
    sources:
      - title: "Voyager: An Open-Ended Embodied Agent with Large Language Models"
        url: "https://arxiv.org/abs/2305.16291"
        type: paper
      - title: "Voyager project"
        url: "https://voyager.minedojo.org/"
        type: article
    notes: "Generalizes Voyager's skill library beyond Minecraft. OpenClaw's Skill Workshop and DeerFlow's skill activation (docs/openclaw-hermes-techniques.md, docs/deer-flow-techniques.md) are production instances of the same pattern without a formal public benchmark."

  - name: Model Cascading / Tiered Routing
    category: cost_runtime
    summary: Queries are sent to a cheap/fast model first; a scoring function or router decides whether to accept that answer or escalate to a stronger, more expensive model.
    loop_shape: query -> cheap model answers -> confidence/router check -> accept, or escalate to stronger model
    runtime_primitives:
      - tiered model registry
      - confidence/router scoring
      - escalation policy
      - cost accounting
    solves:
      - paying premium-model prices for queries a cheap model could have answered
    tradeoffs:
      - router misclassification sends hard queries to the weak model or easy queries to the expensive one
    sources:
      - title: "FrugalGPT: How to Use Large Language Models While Reducing Cost and Improving Performance"
        url: "https://arxiv.org/abs/2305.05176"
        type: paper
      - title: "RouteLLM: Learning to Route LLMs with Preference Data"
        url: "https://arxiv.org/abs/2406.18665"
        type: paper

  - name: Semantic / Prompt Caching Layer
    category: cost_runtime
    summary: The runtime caches model responses or prefix-stable prompt segments so repeated or semantically similar requests skip redundant inference.
    loop_shape: request -> cache lookup (exact or semantic match) -> hit return cached response, miss call model and store result
    runtime_primitives:
      - cache key strategy (exact/prefix/semantic)
      - cache store
      - invalidation policy
      - prefix-stable prompt layout
    solves:
      - redundant inference cost and latency on repeated or near-duplicate requests
    tradeoffs:
      - semantic cache hits can return stale or subtly wrong answers if the similarity threshold is too loose
    sources: []
    notes: "Provider-specific prefix-caching docs exist per vendor; no single canonical cross-provider primary source identified yet. Related to the prefix-cache-friendly dynamic context pattern in docs/deer-flow-techniques.md."

  - name: Saga / Compensating Transaction Loop
    category: transactional_runtime
    summary: A multi-step task that calls several external, stateful APIs records a compensating action for each completed step, so a failure partway through triggers reverse-order compensation instead of leaving partial side effects.
    loop_shape: step 1 -> record compensation -> step 2 -> record compensation -> ... -> failure? -> run compensations in reverse order
    runtime_primitives:
      - step log
      - compensating action per step
      - reverse-order execution
      - saga completion record
    solves:
      - partial side effects from multi-API agent workflows that fail midway
    tradeoffs:
      - every side-effecting step needs a defined compensating action, which is not always possible
    sources: []
    notes: "Classical distributed-systems pattern (saga), applied to agent tool orchestration; no single canonical agent-runtime primary source identified yet."

  - name: Idempotency Key Runtime
    category: transactional_runtime
    summary: Each side-effecting action is tagged with an idempotency key so retries, resumes, or duplicate deliveries execute the action at most once.
    loop_shape: action requested -> idempotency key exists in ledger? -> yes return prior result, no execute and record key and result
    runtime_primitives:
      - idempotency key generation
      - key/result ledger
      - retry-safe execution wrapper
    solves:
      - duplicate side effects from task-queue retries or crash recovery
    tradeoffs:
      - requires every external API to support or tolerate idempotency keys
    sources: []
    notes: "Standard distributed-systems primitive, promoted here from a tradeoff bullet under Task Queue / Resumable Workflow Runtime because production agents that call paid or stateful APIs need it as a first-class control."

  - name: Offline Regression Eval Loop
    category: evaluation_runtime
    summary: A suite of golden transcripts or scenarios is replayed against the agent after every change, and outcomes are scored automatically to catch behavior regressions before deployment.
    loop_shape: change made -> replay eval suite -> score against golden/rubric -> pass/fail gate -> ship or block
    runtime_primitives:
      - golden transcript/scenario suite
      - automated scorer
      - pass/fail gate
      - CI integration
    solves:
      - silent behavior regressions after prompt, tool, or model changes
    tradeoffs:
      - suite coverage limits what regressions are caught
      - scorer quality bounds trust in the gate
    sources: []
    notes: "Widely practiced via eval harnesses and CI gating; no single canonical academic primary source identified yet."

  - name: Adversarial Red-Team / Injection-Regression Loop
    category: evaluation_runtime
    summary: The runtime periodically replays known and generated adversarial inputs (jailbreaks, injection payloads) against the agent and its guardrails to verify defenses still hold as prompts and models change.
    loop_shape: generate/replay adversarial cases -> run through agent and guardrails -> classify bypass or blocked -> track regression over time
    runtime_primitives:
      - adversarial case library
      - replay harness
      - bypass classifier
      - regression tracking
    solves:
      - prompt-injection and jailbreak defenses silently degrading after updates
    tradeoffs:
      - the case library must be refreshed as new attack patterns emerge
      - narrow coverage creates a false sense of safety
    sources:
      - title: "OWASP LLM Prompt Injection Prevention Cheat Sheet"
        url: "https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html"
        type: guide
    notes: "Complements the Prompt-Injection Action Firewall entry: that technique is the runtime defense, this technique is the loop that tests the defense stays effective."

  - name: Parallel Tool-Call Fan-Out / Join
    category: core_action_loop
    summary: A single agent turn issues multiple independent tool calls concurrently and joins their results before continuing, instead of calling tools one at a time.
    loop_shape: model emits N tool calls in one turn -> execute concurrently -> join results -> observe combined result -> continue
    runtime_primitives:
      - concurrent tool dispatch
      - per-call timeout
      - result join
      - partial-failure handling
    solves:
      - latency from serial tool calls when calls are independent
    tradeoffs:
      - partial failures need a defined join policy
      - concurrent calls can hit rate limits together
    sources: []
    notes: "Common production pattern in current tool-calling APIs; no single canonical primary source identified yet. Distinct from multi-agent fan-out, which distributes work across separate agents rather than tool calls within one turn."

  - name: Workflow-Graph / State-Machine Runtime
    category: harness_runtime
    summary: Agent control flow is expressed as an explicit graph of nodes and conditional edges, compiled and executed by a runtime that supports persistence, streaming, and resumption at any node.
    loop_shape: define nodes/edges -> compile graph -> execute from current node -> conditional routing -> checkpoint -> next node
    runtime_primitives:
      - node/edge graph definition
      - conditional routing
      - graph compiler
      - per-node checkpoint
      - resumable execution
    solves:
      - ad hoc control flow that becomes unreadable once branches, loops, and retries accumulate in plain code
    tradeoffs:
      - graph abstraction adds indirection for simple linear agents
      - debugging requires graph-aware tooling
    sources:
      - title: "LangGraph overview"
        url: "https://docs.langchain.com/oss/python/langgraph/overview"
        type: docs
    notes: "LangGraph is cited elsewhere in this repo only as a source for Task Queue and Durable Runtime entries; this entry names the underlying graph/state-machine execution model as its own reusable technique."

  - name: Dynamic Workflow Generation
    category: harness_runtime
    summary: Instead of running a fixed hardcoded harness, the agent writes or selects the workflow/graph structure appropriate to the specific task before executing it.
    loop_shape: task -> agent synthesizes workflow/harness for this task -> execute synthesized workflow -> result
    runtime_primitives:
      - workflow/harness synthesis step
      - synthesized workflow validation
      - execution of the generated workflow
    solves:
      - one-size-fits-all harnesses being a poor fit for tasks with very different shapes
    tradeoffs:
      - a badly synthesized workflow can be worse than a well-tuned fixed harness
      - harder to audit than a fixed, reviewed workflow
    sources:
      - title: "Claude Opus 4.8 announcement"
        url: "https://www.anthropic.com/news/claude-opus-4-8"
        type: article
    notes: "Emerging direction as of 2026; evidence is mostly product/demo-level so far."

  - name: Contract-Net / Auction-Based Delegation
    category: multi_agent_coordination
    summary: Instead of a supervisor assigning tasks directly, agents bid on announced tasks based on estimated fit or cost, and the announcer awards the task to the best bid.
    loop_shape: announce task -> agents submit bids -> award to best bid -> awarded agent executes -> report result
    runtime_primitives:
      - task announcement
      - bid schema
      - award policy
      - execution report
    solves:
      - dynamic task allocation among peer agents without a fixed supervisor hierarchy
    tradeoffs:
      - bidding overhead is wasted when only one agent can plausibly do the task
      - bid quality depends on accurate self-assessment
    sources: []
    notes: "Classical multi-agent-systems pattern (Contract Net Protocol, Smith 1980), promoted from the additional-runtime-patterns.md shortlist; no LLM-agent-specific primary source identified yet."
